server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown routes → index.html (client-side router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed assets (Vite fingerprints these)
    location ~* \.(js|css|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Medium cache for images/icons
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Never cache index.html or XML/text files
    location ~* \.(html|xml|txt|json)$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Gzip (Caddy also compresses, but belt-and-suspenders for direct access)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
