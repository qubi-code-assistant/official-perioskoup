<!doctype html>
<html lang="en-GB">

    <meta charset="UTF-8" />

    <link rel="canonical" href="https://perioskoup.com/" />

    <link rel="alternate" hreflang="x-default" href="https://perioskoup.com/" />

    <meta property="og:title" content="Perioskoup — Your Personal Dental Companion" />

    <meta property="og:image:height" content="630" />

    <meta property="og:site_name" content="Perioskoup" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@perioskoup" />
    <meta name="twitter:title" content="Perioskoup — Your Personal Dental Companion" />
    <meta name="twitter:description" content="AI-powered dental companion app. EFP Innovation Award Winner 2025." />
    <meta name="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/99161099/Petc9UtExvVA722wdGgxhu/og-image-XvtYEDVZMACucdvxk9BYR8.png" />
    <meta name="twitter:image:alt" content="Perioskoup — Between visits, we take over. AI-powered dental companion." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A171E" />

    <!-- RSS Feed -->
    <link rel="alternate" type="application/rss+xml" title="Perioskoup Blog" href="https://perioskoup.com/feed.xml" />

    <!-- Google Fonts: Dongle (display) + Gabarito (body/UI) -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@700&family=Gabarito:wght@400;500;600;700&display=swap" rel="stylesheet" />
